# ==============================================================================
# CampLog Frontend - Pipeline de Produção (S3 + CloudFront)
# Disparado a cada criação de tag (ex: v1.0.0)
# ==============================================================================

when:
  event: tag
  tag: v*

steps:
  # --- 1. GIT (Verificar status e logs) ---
  git-info:
    image: alpine/git
    commands:
      - echo "=== [GIT INFO] Verificando sincronização com o GitHub para Produção ==="
      - git status
      - git log -1 --oneline

  # --- 2. INSTALL (Instalar dependências com pnpm) ---
  install-deps:
    image: node:20-alpine
    commands:
      - echo "=== [INSTALL] Ativando corepack e instalando dependências com pnpm ==="
      - corepack enable
      - pnpm install --frozen-lockfile

  # --- 3. LINT (Executar analisador estático) ---
  lint-check:
    image: node:20-alpine
    commands:
      - echo "=== [LINT] Executando eslint de Produção ==="
      - corepack enable
      - pnpm run lint --continue-on-error

  # --- 4. TESTS (Executar testes automatizados) ---
  test-run:
    image: node:20-alpine
    commands:
      - echo "=== [TESTS] Executando testes unitários do Frontend ==="
      - corepack enable
      - pnpm run test

  # --- 5. BUILD STATIC (Compilação Next.js para Exportação Estática) ---
  build-static:
    image: node:20-alpine
    commands:
      - echo "=== [BUILD] Compilando e gerando arquivos estáticos para o S3 ==="
      - corepack enable
      # NOTA CRÍTICA: Variáveis NEXT_PUBLIC devem ser fornecidas em BUILD-TIME
      - NEXT_PUBLIC_API_URL=$${NEXT_PUBLIC_API_URL} pnpm run build
    environment:
      NEXT_PUBLIC_API_URL:
        from_secret: next_public_api_url_prod

  # --- 6. GET CREDENTIALS ENV (Validar acesso AWS - MOCK / PLACEHOLDER) ---
  get-credentials-env-placeholder:
    image: alpine:latest
    commands:
      - echo "=== [GET CREDENTIALS ENV] Verificação de credenciais AWS (Ignorado: Ambiente de Produção AWS ainda não ativo) ==="
      - echo "Evento de tag ${CI_COMMIT_TAG} recebido com sucesso."

  # --- 7. DEPLOY AWS (Sincronização S3 + Invalidação CloudFront CDN - MOCK / PLACEHOLDER) ---
  deploy-production-placeholder:
    image: alpine:latest
    commands:
      - echo "=== [DEPLOY] Enviando Frontend para o Amazon S3 de Produção ==="
      - echo "[PLACEHOLDER] Upload de apps/web/out para o bucket S3 simulado."
      - echo "=== [DEPLOY] Invalidando cache do CloudFront para atualização global ==="
      - echo "[PLACEHOLDER] Invalidação da distribuição CloudFront simulada."

